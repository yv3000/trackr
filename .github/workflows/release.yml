name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build trackr.exe
        run: |
          $tag = "${{ github.ref_name }}"
          go build -ldflags="-s -w -X trackr/cmd.version=$tag" -o trackr.exe .
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: trackr.exe
          generate_release_notes: true
